<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">DGDreams professional Web3 gaming logo</title>
  <desc id="desc">A premium neon Web3 gaming logo for a wallet-connected on-chain task hub and 2048 game.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A18"/>
      <stop offset="0.48" stop-color="#0B1027"/>
      <stop offset="1" stop-color="#10091F"/>
    </linearGradient>
    <radialGradient id="glowA" cx="44%" cy="39%" r="42%">
      <stop offset="0" stop-color="#36F5FF" stop-opacity="0.45"/>
      <stop offset="0.52" stop-color="#6B4DFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="60%" cy="60%" r="40%">
      <stop offset="0" stop-color="#FF3FD7" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="310" y1="235" x2="705" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5DFFF4"/>
      <stop offset="0.45" stop-color="#6D61FF"/>
      <stop offset="1" stop-color="#FF3FD7"/>
    </linearGradient>
    <linearGradient id="tileGrad" x1="413" y1="333" x2="596" y2="565" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FEFF"/>
      <stop offset="0.5" stop-color="#74F3FF"/>
      <stop offset="1" stop-color="#7E5CFF"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="760" y1="412" x2="1280" y2="585" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#C9D4FF"/>
      <stop offset="1" stop-color="#77F5FF"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#52ECFF" flood-opacity="0.22"/>
    </filter>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.20 0 0 0 0 0.90 0 0 0 0 1.00 0 0 0 0.60 0" result="cyanGlow"/>
      <feMerge>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedCard">
      <rect x="120" y="120" width="1360" height="760" rx="54"/>
    </clipPath>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g clip-path="url(#roundedCard)">
    <rect x="120" y="120" width="1360" height="760" rx="54" fill="#090D20"/>
    <rect x="120" y="120" width="1360" height="760" rx="54" fill="url(#glowA)"/>
    <rect x="120" y="120" width="1360" height="760" rx="54" fill="url(#glowB)"/>
    <g opacity="0.20" stroke="#FFFFFF" stroke-width="1">
      <path d="M120 260H1480M120 380H1480M120 500H1480M120 620H1480M120 740H1480"/>
      <path d="M260 120V880M400 120V880M540 120V880M680 120V880M820 120V880M960 120V880M1100 120V880M1240 120V880M1380 120V880"/>
    </g>
    <g opacity="0.35" fill="#70F4FF">
      <circle cx="1200" cy="255" r="4"/>
      <circle cx="1268" cy="315" r="3"/>
      <circle cx="1336" cy="235" r="5"/>
      <circle cx="1170" cy="690" r="3"/>
      <circle cx="1320" cy="730" r="4"/>
      <circle cx="1000" cy="205" r="3"/>
    </g>
  </g>

  <!-- Logo mark -->
  <g transform="translate(248 235)" filter="url(#softShadow)">
    <path d="M280 0C435 0 560 125 560 280C560 435 435 560 280 560H84C38 560 0 522 0 476V84C0 38 38 0 84 0H280Z" fill="#111630" stroke="url(#markGrad)" stroke-width="16"/>
    <path d="M134 96H278C379 96 464 179 464 280C464 381 379 464 278 464H134C113 464 96 447 96 426V134C96 113 113 96 134 96Z" fill="#070A18" stroke="url(#markGrad)" stroke-width="14"/>
    <path d="M184 171H276C337 171 388 220 388 280C388 340 337 389 276 389H184V171Z" fill="none" stroke="#E9FDFF" stroke-opacity="0.96" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 2048-style pixels inside D -->
    <g filter="url(#neon)">
      <rect x="190" y="190" width="58" height="58" rx="14" fill="url(#tileGrad)"/>
      <rect x="262" y="190" width="58" height="58" rx="14" fill="#6A5CFF"/>
      <rect x="190" y="262" width="58" height="58" rx="14" fill="#29E9FF"/>
      <rect x="262" y="262" width="58" height="58" rx="14" fill="#FF46D8"/>
    </g>

    <!-- Orbit / blockchain ring -->
    <ellipse cx="280" cy="280" rx="292" ry="142" fill="none" stroke="#50F3FF" stroke-width="8" stroke-opacity="0.78" transform="rotate(-28 280 280)"/>
    <ellipse cx="280" cy="280" rx="292" ry="142" fill="none" stroke="#FF3FD7" stroke-width="5" stroke-opacity="0.42" transform="rotate(28 280 280)"/>
    <circle cx="59" cy="198" r="18" fill="#55F6FF" stroke="#FFFFFF" stroke-width="6"/>
    <circle cx="501" cy="361" r="18" fill="#FF3FD7" stroke="#FFFFFF" stroke-width="6"/>
    <circle cx="431" cy="106" r="13" fill="#8B72FF" stroke="#FFFFFF" stroke-width="5"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(780 396)">
    <text x="0" y="0" fill="url(#wordGrad)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="104" font-weight="800" letter-spacing="-3">DGDreams</text>
    <rect x="2" y="42" width="510" height="4" rx="2" fill="url(#markGrad)" opacity="0.95"/>
    <text x="0" y="100" fill="#AEB9E8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="4">WEB3 TASK HUB · ON-CHAIN PLAY</text>
    <g transform="translate(0 160)">
      <rect x="0" y="0" width="166" height="46" rx="23" fill="#121A39" stroke="#26366F"/>
      <circle cx="30" cy="23" r="8" fill="#40F4FF"/>
      <text x="51" y="31" fill="#DDE7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Wallet</text>
      <rect x="188" y="0" width="146" height="46" rx="23" fill="#121A39" stroke="#26366F"/>
      <circle cx="218" cy="23" r="8" fill="#FF43D6"/>
      <text x="239" y="31" fill="#DDE7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">2048</text>
      <rect x="356" y="0" width="150" height="46" rx="23" fill="#121A39" stroke="#26366F"/>
      <circle cx="386" cy="23" r="8" fill="#8B72FF"/>
      <text x="407" y="31" fill="#DDE7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">EVM</text>
    </g>
  </g>

  <rect x="120" y="120" width="1360" height="760" rx="54" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
</svg>
